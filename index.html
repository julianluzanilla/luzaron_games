<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Luzaron Games">
  <title>Luzaron Games</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <noscript>Esta app necesita JavaScript para funcionar.</noscript>

  <div id="app" class="app-shell">
    <header class="topbar">
      <div>
        <h1>Luzaron Games</h1>
        <p id="connectionStatus" class="status-pill">Verificando conexión...</p>
      </div>
      <button id="installHintButton" class="ghost-button" type="button">Instalar en iPad</button>
    </header>

    <main id="view" class="view"></main>

    <footer class="footer">
      <span>Offline-first · Uso familiar privado</span>
      <span id="storageStatus">Preparando niveles...</span>
    </footer>
  </div>

  <script type="module" src="./app/shell.js"></script>
</body>
</html>
